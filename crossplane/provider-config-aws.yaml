apiVersion: v1
kind: Secret
metadata:
  name: aws-creds
  namespace: crossplane-system
type: Opaque
stringData:
  # Replace with real credentials or use IRSA in production
  credentials: |
    [default]
    aws_access_key_id = REPLACE_ME
    aws_secret_access_key = REPLACE_ME
---
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: aws-real
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: aws-creds
      key: credentials
