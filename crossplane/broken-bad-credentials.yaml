## ──────────────────────────────────────────────────────────
## INTENTIONALLY BROKEN — Bad Credentials
##
## This ProviderConfig references a Secret that does not exist.
## Crossplane will accept the ProviderConfig but any Managed
## Resource that uses it will stay stuck at SYNCED=False /
## READY=False with a "cannot get credentials" error.
##
## Diagnosis:
##   kubectl describe bucket.s3.aws.upbound.io broken-creds-bucket
##   → look at Status.Conditions and Events
##
## Fix:
##   kubectl apply -f crossplane/provider-config-localstack.yaml
##   kubectl patch bucket.s3.aws.upbound.io broken-creds-bucket \
##     --type merge -p '{"spec":{"providerConfigRef":{"name":"localstack"}}}'
## ──────────────────────────────────────────────────────────
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: bad-creds
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: this-secret-does-not-exist
      key: credentials
  endpoint:
    url:
      type: Static
      static: http://localstack.crossplane-demo.svc.cluster.local:4566
    hostnameImmutable: true
---
apiVersion: s3.aws.upbound.io/v1beta2
kind: Bucket
metadata:
  name: broken-creds-bucket
  labels:
    demo: troubleshoot
spec:
  forProvider:
    region: us-east-1
  providerConfigRef:
    name: bad-creds
