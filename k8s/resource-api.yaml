apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-api
  namespace: crossplane-demo
  labels:
    app: resource-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-api
  template:
    metadata:
      labels:
        app: resource-api
    spec:
      serviceAccountName: resource-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: resource-api
          image: crossplane-demo/resource-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: resource-api-config
                  key: BUCKET_NAME
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: resource-api-config
                  key: AWS_REGION
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: resource-api-config
                  key: S3_ENDPOINT
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 10
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
